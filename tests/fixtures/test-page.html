<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shotput Test Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #FFFFFF; }
    .container { padding: 20px; }
    h1 { color: #333; margin-bottom: 20px; }
    .color-block {
      width: 200px;
      height: 200px;
      background-color: #FF6600;
    }
    .info {
      margin-top: 20px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Shotput Test Page</h1>
    <div class="color-block" data-testid="color-block"></div>
    <p class="info" data-testid="info">Static test page for screenshot verification</p>
  </div>
</body>
</html>
